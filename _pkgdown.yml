url: https://steverozen.github.io/mSigPlot/

template:
  bootstrap: 5
  bootswatch: flatly

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github, search]
  components:
    intro:
      text: Get Started
      href: articles/mSigPlot.html
    articles:
      text: Articles
      href: articles/index.html

articles:
  - title: Articles
    contents:
      - mSigPlot

reference:
  - title: Auto-dispatch
    desc: >
      Auto-detect catalog type by row count and dispatch to the
      appropriate plotting function. Start here if you are unsure
      which function to use.
    contents:
      - plot_guess
      - plot_guess_pdf

  - title: SBS (single base substitution)
    desc: >
      Plot single base substitution spectra and signatures at various
      resolutions: 12 (simplified), 96 (trinucleotide context),
      192 (strand-aware), 288 (3-panel strand-aware), and 1536
      (pentanucleotide context).
    contents:
      - plot_SBS96
      - plot_SBS96_pdf
      - plot_SBS192
      - plot_SBS192_pdf
      - plot_SBS12
      - plot_SBS12_pdf
      - plot_SBS288
      - plot_SBS1536
      - plot_SBS1536_pdf

  - title: DBS (doublet base substitution)
    desc: >
      Plot doublet base substitution spectra and signatures:
      78-channel bar plots, 136-channel heatmaps, and 144-channel
      strand-aware bar plots.
    contents:
      - plot_DBS78
      - plot_DBS78_pdf
      - plot_DBS136
      - plot_DBS136_pdf
      - plot_DBS144
      - plot_DBS144_pdf

  - title: Indel
    desc: >
      Plot small insertion and deletion spectra and signatures:
      ID83 (COSMIC), ID89 (Koh classification), ID166 (genic/intergenic),
      and ID476 (flanking base context).
    contents:
      - plot_ID83
      - plot_ID83_pdf
      - plot_ID89
      - plot_ID89_pdf
      - plot_ID166
      - plot_ID166_pdf
      - plot_ID476
      - plot_ID476_pdf
      - plot_ID476_right
      - plot_ID476_right_pdf

  - title: Utilities
    desc: Helper functions for working with catalog data.
    contents:
      - catalog_row_order
      - id89_figlabels

footer:
  structure:
    left:  developed_by
    right: built_with
